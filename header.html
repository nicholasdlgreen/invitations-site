<style>
:root {
  --cream:#FAF7F2; --blush:#F0DDD8; --lav:#DDD5E8; --sage:#D1DDD0;
  --mist:#E8EBF0; --gold:#B8976A; --gold-lt:#D4B896; --brown:#6B4F3A;
  --text:#3D2E24; --soft:#7A6558; --pale:#B0A098; --white:#FFFFFF;
  --border:#E8DDD8; --ok:#5A9E6F; --warn:#C97B3A; --err:#C94A3A;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:'Jost',sans-serif; font-weight:300; background:var(--cream); color:var(--text); line-height:1.7; min-height:100vh; }
.serif { font-family:'Cormorant Garamond',serif; }
.hidden { display:none !important; }
@keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── HEADER ── */
header { background:var(--white); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:200; }
.hinner { max-width:1180px; margin:0 auto; padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between; }
.logo { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:400; letter-spacing:.06em; color:var(--text); text-decoration:none; }
.logo span { color:var(--gold); }
nav { display:flex; align-items:center; gap:32px; }
nav a { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--soft); text-decoration:none; transition:color .2s; }
nav a:hover, nav a.active { color:var(--gold); }
.cart-btn { display:flex; align-items:center; gap:8px; padding:10px 22px; background:var(--gold); color:#fff; border:none; font-family:'Jost',sans-serif; font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:500; cursor:pointer; transition:background .25s; border-radius:60px; }
.cart-btn:hover { background:var(--brown); }
.cart-count { background:rgba(255,255,255,.25); padding:2px 8px; font-size:10px; border-radius:20px; }

/* ── BUTTONS ── */
.btn { display:inline-flex; align-items:center; gap:8px; padding:15px 38px; background:var(--gold); color:#fff; border:none; font-family:'Jost',sans-serif; font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:500; cursor:pointer; transition:background .25s,box-shadow .25s; text-decoration:none; border-radius:60px; box-shadow:0 4px 18px rgba(184,151,106,.25); }
.btn:hover { background:var(--brown); box-shadow:0 6px 24px rgba(107,79,58,.3); }
.btn-out { display:inline-flex; align-items:center; gap:8px; padding:14px 37px; background:transparent; color:var(--gold); border:1px solid var(--gold); font-family:'Jost',sans-serif; font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:500; cursor:pointer; transition:all .25s; text-decoration:none; border-radius:60px; }
.btn-out:hover { background:var(--gold); color:#fff; box-shadow:0 6px 24px rgba(184,151,106,.25); }

/* ── LAYOUT ── */
.container { max-width:1180px; margin:0 auto; padding:0 32px; }
.section { padding:90px 0; }
.tag { font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--gold); font-weight:500; margin-bottom:14px; display:block; }
.section-title { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,3.5vw,3rem); font-weight:400; line-height:1.2; color:var(--text); }
.divider { width:48px; height:1px; background:var(--gold-lt); margin:20px 0; }
.centered { text-align:center; }
.centered .divider { margin:20px auto; }

/* ── CART DRAWER ── */
.cart-bg { position:fixed; inset:0; background:rgba(61,46,36,.4); z-index:400; display:none; }
.cart-bg.open { display:block; }
.cart-drawer { position:fixed; right:0; top:0; bottom:0; width:420px; background:var(--white); z-index:401; transform:translateX(100%); transition:transform .35s ease; display:flex; flex-direction:column; border-radius:20px 0 0 20px; }
.cart-drawer.open { transform:translateX(0); }
.cart-head { padding:24px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.cart-head h3 { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:400; }
.cart-scroll { flex:1; overflow-y:auto; padding:20px 28px; }
.cart-item { display:flex; gap:16px; padding:16px 0; border-bottom:1px solid var(--border); }
.cart-item-img { width:60px; height:80px; background:var(--cream); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:18px; border-radius:8px; }
.cart-item-info { flex:1; }
.cart-item-name { font-family:'Cormorant Garamond',serif; font-size:1rem; font-weight:400; margin-bottom:4px; }
.cart-item-meta { font-size:11px; color:var(--soft); margin-bottom:8px; }
.cart-item-price { font-size:13px; color:var(--gold); }
.cart-remove { background:none; border:none; font-size:18px; color:var(--pale); cursor:pointer; padding:4px; }
.cart-foot { padding:20px 28px; border-top:1px solid var(--border); }
.cart-row { display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px; }
.cart-row.vat { font-size:11px; color:var(--soft); }
.cart-row.total { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:400; margin-bottom:20px; padding-top:12px; border-top:1px solid var(--border); }
.cart-empty { text-align:center; padding:60px 20px; color:var(--pale); }
.modal-close { background:none; border:none; font-size:20px; color:var(--pale); cursor:pointer; line-height:1; padding:4px; }

/* ── TOAST ── */
.toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:#fff; padding:14px 28px; border-radius:60px; font-size:12px; letter-spacing:.06em; opacity:0; transition:all .35s; z-index:999; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width:768px) {
  .hinner nav { display:none; }
  .footer-top { grid-template-columns:1fr 1fr; gap:32px; }
}
@media (max-width:480px) {
  .footer-top { grid-template-columns:1fr; }
}
</style>

<header>
  <div class="hinner">
    <a class="logo" href="/">Invita<span>tions</span></a>
    <nav>
      <a href="/products.html">Products</a>
      <a href="/upload-and-print.html">Upload &amp; Print</a>
      <a href="/design-studio.html">Design Studio</a>
      <a href="/how-it-works.html">How We Work</a>
      <a href="/track-order.html">Track My Order</a>
    </nav>
    <button class="cart-btn" onclick="openCart()">
      Basket <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<!-- CART DRAWER -->
<div class="cart-bg" id="cartBg" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-head">
    <h3 class="serif">Your Basket</h3>
    <button class="modal-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-scroll" id="cartScroll"></div>
  <div class="cart-foot" id="cartFoot" style="display:none">
    <div class="cart-row"><span>Subtotal (excl. VAT)</span><span id="cartNet">£0.00</span></div>
    <div class="cart-row vat"><span>VAT (20%)</span><span id="cartVat">£0.00</span></div>
    <div class="cart-row total serif"><span>Total</span><span id="cartTotal">£0.00</span></div>
    <a class="btn" href="/upload-and-print.html" style="width:100%;justify-content:center;text-decoration:none;">Continue to Checkout</a>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CART (localStorage-persisted) ───────────────────────
let cart = [];
try { cart = JSON.parse(localStorage.getItem('inv_cart') || '[]'); } catch(e) { cart = []; }

function saveCart()        { localStorage.setItem('inv_cart', JSON.stringify(cart)); }
function updateCartBadge() { document.querySelectorAll('#cartCount').forEach(el => el.textContent = cart.length); }
function removeCartItem(i) { cart.splice(i,1); saveCart(); updateCartBadge(); renderCartDrawer(); }
function openCart()        { renderCartDrawer(); document.getElementById('cartBg').classList.add('open'); document.getElementById('cartDrawer').classList.add('open'); }
function closeCart()       { document.getElementById('cartBg').classList.remove('open'); document.getElementById('cartDrawer').classList.remove('open'); }
function showToast(msg)    { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }

function renderCartDrawer() {
  const scroll = document.getElementById('cartScroll');
  const foot   = document.getElementById('cartFoot');
  if (!cart.length) {
    scroll.innerHTML = `<div class="cart-empty"><div style="font-size:40px;margin-bottom:16px;">✦</div><p style="font-size:13px;color:var(--pale);">Your basket is empty</p><a href="/products.html" onclick="closeCart()" style="display:inline-block;margin-top:12px;font-size:11px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;text-decoration:none;">View Products →</a></div>`;
    foot.style.display = 'none'; return;
  }
  scroll.innerHTML = cart.map((item,i) => `
    <div class="cart-item">
      <div class="cart-item-img">${item.icon||'✦'}</div>
      <div class="cart-item-info">
        <div class="cart-item-name serif">${item.name}</div>
        <div class="cart-item-meta">${item.qty} invitations · ${item.paper||'Smooth White'}</div>
        <div class="cart-item-price">£${item.total.toFixed(2)}</div>
      </div>
      <button class="cart-remove" onclick="removeCartItem(${i})">✕</button>
    </div>`).join('');
  const sub = cart.reduce((s,i)=>s+i.total,0);
  document.getElementById('cartNet').textContent   = '£'+(sub/1.2).toFixed(2);
  document.getElementById('cartVat').textContent   = '£'+(sub - sub/1.2).toFixed(2);
  document.getElementById('cartTotal').textContent = '£'+sub.toFixed(2);
  foot.style.display = 'block';
}

updateCartBadge();
</script>
