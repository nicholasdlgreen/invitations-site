<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natch — Product Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FAF7F2;
  --gold: #B8976A;
  --gold-lt: #D4B896;
  --brown: #6B4F3A;
  --text: #3D2E24;
  --bg: #F5F0E8;
  --white: #FFFFFF;
  --border: rgba(107,79,58,0.15);
  --shadow: 0 4px 24px rgba(61,46,36,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Jost', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── BUILDER WRAPPER ── */
.builder-wrap {
  max-width: 780px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

.builder-heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 400;
  color: var(--text);
  text-align: center;
  letter-spacing: 0.04em;
  margin-bottom: 8px;
}
.builder-sub {
  text-align: center;
  font-size: 13px;
  color: var(--brown);
  opacity: 0.7;
  letter-spacing: 0.08em;
  margin-bottom: 48px;
}

/* ── STEP ── */
.step {
  margin-bottom: 32px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.step-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 6px;
}
.step-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: 0.02em;
}

/* ── OPTION PILLS ── */
.options-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.option-pill {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 22px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--white);
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  transition: all 0.18s ease;
  box-shadow: 0 2px 8px rgba(61,46,36,0.04);
  position: relative;
  min-width: 90px;
  text-align: center;
}
.option-pill:hover {
  border-color: var(--gold-lt);
  background: #FFFBF6;
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(184,151,106,0.15);
}
.option-pill.selected {
  border-color: var(--gold);
  background: linear-gradient(135deg, #FFFBF5 0%, #FFF7EC 100%);
  box-shadow: 0 4px 20px rgba(184,151,106,0.2);
}
.option-pill.selected::after {
  content: '✓';
  position: absolute;
  top: -8px;
  right: -8px;
  width: 18px;
  height: 18px;
  background: var(--gold);
  color: white;
  border-radius: 50%;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 18px;
}
.option-pill .pill-name {
  font-weight: 500;
  font-size: 13px;
  color: var(--text);
}
.option-pill .pill-sub {
  font-size: 10px;
  color: var(--brown);
  opacity: 0.6;
  margin-top: 2px;
  letter-spacing: 0.04em;
}

/* Quantity pills show price */
.option-pill.qty-pill {
  min-width: 120px;
  padding: 14px 20px;
}
.option-pill.qty-pill .pill-qty {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 400;
  color: var(--text);
  line-height: 1;
}
.option-pill.qty-pill .pill-unit {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--brown);
  opacity: 0.5;
  margin-top: 2px;
}
.option-pill.qty-pill .pill-price {
  font-size: 15px;
  font-weight: 600;
  color: var(--gold);
  margin-top: 6px;
}
.option-pill.qty-pill .pill-per {
  font-size: 10px;
  color: var(--brown);
  opacity: 0.5;
}

/* ── DIVIDER ── */
.step-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 24px 0;
}

/* ── SUMMARY PANEL ── */
.summary-panel {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 28px 32px;
  margin-top: 32px;
  box-shadow: var(--shadow);
}
.summary-panel .summary-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: 0.03em;
}
.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.summary-row:last-of-type { border-bottom: none; }
.summary-row .s-label { color: var(--brown); opacity: 0.7; }
.summary-row .s-value { font-weight: 500; color: var(--text); }
.summary-price-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 16px 0 0;
  margin-top: 8px;
  border-top: 1.5px solid var(--border);
}
.summary-price-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--text);
}
.summary-price-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 500;
  color: var(--text);
}
.summary-price-per {
  font-size: 12px;
  color: var(--brown);
  opacity: 0.55;
  text-align: right;
  margin-top: 2px;
}

/* ── CTA ── */
.cta-row {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  align-items: center;
}
.btn-primary {
  flex: 1;
  background: var(--text);
  color: var(--cream);
  border: none;
  border-radius: 6px;
  padding: 16px 28px;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary:hover { background: var(--brown); }
.btn-reset {
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 16px 20px;
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  color: var(--brown);
  opacity: 0.7;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: all 0.2s;
}
.btn-reset:hover { opacity: 1; border-color: var(--gold-lt); }

/* ── LOADING / ERROR ── */
.loading-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--brown);
  opacity: 0.5;
}
.loading-spinner {
  width: 32px;
  height: 32px;
  border: 2px solid rgba(184,151,106,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state {
  background: #FDF5F5;
  border: 1px solid rgba(199,92,92,0.2);
  border-radius: 8px;
  padding: 20px 24px;
  color: #C75C5C;
  font-size: 13px;
  margin-bottom: 24px;
}

/* ── PROGRESS BAR ── */
.progress-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 40px;
  align-items: center;
}
.progress-step {
  flex: 1;
  height: 3px;
  background: rgba(184,151,106,0.15);
  border-radius: 2px;
  transition: background 0.3s;
}
.progress-step.done { background: var(--gold); }
.progress-step.active { background: var(--gold-lt); }
</style>
</head>
<body>

<div class="builder-wrap" id="builderRoot">
  <div class="loading-state">
    <div class="loading-spinner"></div>
    Loading your options…
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// Replace ANON_KEY with your Supabase anon key (safe to expose)
// ═══════════════════════════════════════════════════════
const SUPABASE_URL = 'https://jvcpzmumkyjdyibmwlsd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2Y3B6bXVta3lqZHlpYm13bHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTY2MzYsImV4cCI6MjA4OTg5MjYzNn0.JBOAoMdotrbxmL3M4nFhdJ6yQWX45YbgtDCgMtJktSE';

// ── STATE ───────────────────────────────────────────────
let pricingData = []; // full array of price points from Supabase
let selection = {
  productType: null,
  size: null,
  paperType: null,
  finish: null,
  qty: null,
  sellPrice: null
};

// ── FETCH PRICING FROM SUPABASE ──────────────────────────
async function loadPricing() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/pricing_config?id=eq.singleton&select=payload,published_at`,
      {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      }
    );
    if (!res.ok) throw new Error('Could not load pricing data');
    const rows = await res.json();
    if (!rows.length) throw new Error('No pricing published yet — publish from the Pricing Engine first');
    pricingData = rows[0].payload.prices || [];
    if (!pricingData.length) throw new Error('No price points found in published data');
    renderBuilder();
  } catch (err) {
    document.getElementById('builderRoot').innerHTML = `
      <div class="builder-heading">Design Your Stationery</div>
      <div class="error-state">⚠ ${err.message}</div>`;
  }
}

// ── FILTER HELPERS ───────────────────────────────────────
// Returns all pricing rows that match the current partial selection
function filtered(overrides = {}) {
  const s = { ...selection, ...overrides };
  return pricingData.filter(p =>
    (!s.productType || p.productType === s.productType) &&
    (!s.size        || p.size === s.size) &&
    (!s.paperType   || p.paperType === s.paperType) &&
    (!s.finish      || p.finish === s.finish) &&
    (!s.qty         || p.qty === s.qty)
  );
}

// Distinct values for a field, given a partial selection
function options(field, overrides = {}) {
  return [...new Set(filtered(overrides).map(p => p[field]).filter(Boolean))].sort();
}

// ── RENDER ───────────────────────────────────────────────
function renderBuilder() {
  const root = document.getElementById('builderRoot');
  const steps = getCompletedSteps();
  const totalSteps = 5;
  const doneCount = steps.length;

  let html = `
    <h1 class="builder-heading">Design Your Stationery</h1>
    <p class="builder-sub">Build your perfect piece — every option below is available to order</p>
    <div class="progress-bar">
      ${Array.from({length: totalSteps}, (_, i) => `
        <div class="progress-step ${i < doneCount ? 'done' : i === doneCount ? 'active' : ''}"></div>
      `).join('')}
    </div>`;

  // ── STEP 1: Product Type ──
  html += renderStep(
    1, 'What are you making?',
    options('productType'),
    selection.productType,
    val => select('productType', val),
    true // always visible
  );

  // ── STEP 2: Size ──
  if (selection.productType) {
    const sizeOpts = options('size', { size: null, paperType: null, finish: null, qty: null });
    html += `<hr class="step-divider">`;
    html += renderStep(2, 'Choose a size', sizeOpts, selection.size, val => select('size', val));
  }

  // ── STEP 3: Paper ──
  if (selection.size) {
    const paperOpts = options('paperType', { paperType: null, finish: null, qty: null });
    html += `<hr class="step-divider">`;
    html += renderStep(3, 'Paper stock', paperOpts, selection.paperType, val => select('paperType', val), false, p => {
      // show paper weight as sub-label if available
      const rows = filtered({ paperType: p, finish: null, qty: null });
      const weights = [...new Set(rows.map(r => r.paperWeight).filter(Boolean))];
      return weights.length ? weights[0] : null;
    });
  }

  // ── STEP 4: Finish ──
  if (selection.paperType) {
    const finishOpts = options('finish', { finish: null, qty: null });
    html += `<hr class="step-divider">`;
    html += renderStep(4, 'Finishing', finishOpts, selection.finish, val => select('finish', val));
  }

  // ── STEP 5: Quantity ──
  if (selection.finish !== null && selection.finish !== undefined) {
    const qtyRows = filtered({ qty: null });
    html += `<hr class="step-divider">`;
    html += renderQtyStep(qtyRows);
  }

  // ── SUMMARY ──
  if (selection.qty && selection.sellPrice) {
    html += renderSummary();
  }

  root.innerHTML = html;
  attachHandlers();
}

function renderStep(num, title, opts, current, onSelect, alwaysShow = false, subFn = null) {
  if (!opts.length) return '';
  return `
    <div class="step" id="step-${num}">
      <div class="step-label">Step ${num}</div>
      <div class="step-title">${title}</div>
      <div class="options-grid">
        ${opts.map(v => `
          <button class="option-pill ${current === v ? 'selected' : ''}"
                  data-action="select-${num}" data-value="${encodeURIComponent(v)}">
            <span class="pill-name">${v}</span>
            ${subFn && subFn(v) ? `<span class="pill-sub">${subFn(v)}</span>` : ''}
          </button>`).join('')}
      </div>
    </div>`;
}

function renderQtyStep(qtyRows) {
  if (!qtyRows.length) return '';
  const sorted = [...qtyRows].sort((a, b) => a.qty - b.qty);
  return `
    <div class="step" id="step-5">
      <div class="step-label">Step 5</div>
      <div class="step-title">How many do you need?</div>
      <div class="options-grid">
        ${sorted.map(r => `
          <button class="option-pill qty-pill ${selection.qty === r.qty ? 'selected' : ''}"
                  data-action="select-qty" data-qty="${r.qty}" data-price="${r.sellPrice}">
            <span class="pill-qty">${r.qty}</span>
            <span class="pill-unit">cards</span>
            <span class="pill-price">£${r.sellPrice.toFixed(2)}</span>
            <span class="pill-per">£${(r.sellPrice / r.qty).toFixed(2)} each</span>
          </button>`).join('')}
      </div>
    </div>`;
}

function renderSummary() {
  const perCard = (selection.sellPrice / selection.qty).toFixed(2);
  return `
    <div class="summary-panel">
      <div class="summary-title">Your Order Summary</div>
      <div class="summary-row"><span class="s-label">Product</span><span class="s-value">${selection.productType}</span></div>
      <div class="summary-row"><span class="s-label">Size</span><span class="s-value">${selection.size}</span></div>
      <div class="summary-row"><span class="s-label">Paper</span><span class="s-value">${selection.paperType}</span></div>
      <div class="summary-row"><span class="s-label">Finish</span><span class="s-value">${selection.finish === 'None' ? 'No finish' : selection.finish}</span></div>
      <div class="summary-row"><span class="s-label">Quantity</span><span class="s-value">${selection.qty} cards</span></div>
      <div class="summary-price-row">
        <div class="summary-price-label">Total</div>
        <div>
          <div class="summary-price-value">£${selection.sellPrice.toFixed(2)}</div>
          <div class="summary-price-per">£${perCard} per card</div>
        </div>
      </div>
      <div class="cta-row">
        <button class="btn-primary" onclick="addToCart()">Personalise &amp; Order</button>
        <button class="btn-reset" onclick="resetBuilder()">Start Again</button>
      </div>
    </div>`;
}

// ── HANDLERS ─────────────────────────────────────────────
function attachHandlers() {
  document.querySelectorAll('[data-action="select-1"]').forEach(btn =>
    btn.addEventListener('click', () => select('productType', decodeURIComponent(btn.dataset.value))));
  document.querySelectorAll('[data-action="select-2"]').forEach(btn =>
    btn.addEventListener('click', () => select('size', decodeURIComponent(btn.dataset.value))));
  document.querySelectorAll('[data-action="select-3"]').forEach(btn =>
    btn.addEventListener('click', () => select('paperType', decodeURIComponent(btn.dataset.value))));
  document.querySelectorAll('[data-action="select-4"]').forEach(btn =>
    btn.addEventListener('click', () => select('finish', decodeURIComponent(btn.dataset.value))));
  document.querySelectorAll('[data-action="select-qty"]').forEach(btn =>
    btn.addEventListener('click', () => {
      selection.qty = parseInt(btn.dataset.qty);
      selection.sellPrice = parseFloat(btn.dataset.price);
      renderBuilder();
      // scroll to summary
      setTimeout(() => document.querySelector('.summary-panel')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    }));
}

function select(field, value) {
  selection[field] = value;
  // Clear all downstream selections when a step changes
  const order = ['productType', 'size', 'paperType', 'finish', 'qty', 'sellPrice'];
  const idx = order.indexOf(field);
  order.slice(idx + 1).forEach(f => selection[f] = null);

  // Auto-select if only one option available downstream
  autoAdvance(field);
  renderBuilder();

  // Scroll to next step
  setTimeout(() => {
    const nextStep = { productType: 2, size: 3, paperType: 4, finish: 5 }[field];
    if (nextStep) document.getElementById('step-' + nextStep)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 80);
}

function autoAdvance(justSelected) {
  const chain = [
    { check: 'productType', next: 'size' },
    { check: 'size', next: 'paperType' },
    { check: 'paperType', next: 'finish' },
    { check: 'finish', next: null }
  ];
  for (const { check, next } of chain) {
    if (check === justSelected && next) {
      const opts = options(next, { [next]: null, qty: null });
      if (opts.length === 1) {
        selection[next] = opts[0];
        autoAdvance(next); // cascade
      }
      break;
    }
  }
}

function getCompletedSteps() {
  const steps = [];
  if (selection.productType) steps.push(1);
  if (selection.size) steps.push(2);
  if (selection.paperType) steps.push(3);
  if (selection.finish) steps.push(4);
  if (selection.qty) steps.push(5);
  return steps;
}

function resetBuilder() {
  selection = { productType: null, size: null, paperType: null, finish: null, qty: null, sellPrice: null };
  renderBuilder();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function addToCart() {
  // Hook this into your existing cart/Stripe flow
  // selection object contains: productType, size, paperType, finish, qty, sellPrice
  const item = {
    name: `${selection.productType} — ${selection.size} / ${selection.paperType}${selection.finish !== 'None' ? ' / ' + selection.finish : ''}`,
    quantity: selection.qty,
    price: selection.sellPrice,
    spec: { ...selection }
  };
  console.log('Add to cart:', item);
  // TODO: wire into your existing addToCart() / Stripe checkout flow in invitations-site.html
  alert(`Adding to cart:\n${item.name}\nQty: ${item.quantity}\nPrice: £${item.price.toFixed(2)}`);
}

// ── INIT ─────────────────────────────────────────────────
loadPricing();
</script>
</body>
</html>
