<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@200;300;400;500;600&family=Great+Vibes&display=swap');

:root {
  --cream: #FAF7F2; --blush: #F0DDD8; --lav: #DDD5E8; --sage: #D1DDD0;
  --mist: #E8EBF0; --gold: #B8976A; --gold-lt: #D4B896; --brown: #6B4F3A;
  --text: #3D2E24; --soft: #7A6558; --pale: #B0A098; --white: #FFFFFF;
  --border: #E8DDD8; --ok: #5A9E6F; --warn: #C97B3A; --err: #C94A3A;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Jost', sans-serif; font-weight: 300; background: var(--cream); color: var(--text); line-height: 1.7; min-height: 100vh; }
.serif { font-family: 'Cormorant Garamond', serif; }
.hidden { display: none !important; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── HEADER ── */
header { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
.hinner { max-width: 1180px; margin: 0 auto; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; letter-spacing: .06em; color: var(--text); text-decoration: none; cursor: pointer; }
.logo span { color: var(--gold); }
nav { display: flex; align-items: center; gap: 32px; }
nav a { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--soft); text-decoration: none; transition: color .2s; cursor: pointer; }
nav a:hover, nav a.active { color: var(--gold); }

.cart-btn { display: flex; align-items: center; gap: 8px; padding: 10px 22px; background: var(--gold); color: #fff; border: none; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; font-weight: 500; cursor: pointer; transition: background .25s; border-radius: 60px; }
.cart-btn:hover { background: var(--brown); }
.cart-count { background: rgba(255,255,255,.25); padding: 2px 8px; font-size: 10px; border-radius: 20px; }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 15px 38px; background: var(--gold); color: #fff; border: none; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; font-weight: 500; cursor: pointer; transition: background .25s, box-shadow .25s; text-decoration: none; border-radius: 60px; box-shadow: 0 4px 18px rgba(184,151,106,.25); }
.btn:hover { background: var(--brown); box-shadow: 0 6px 24px rgba(107,79,58,.3); }
.btn:disabled { background: var(--pale); cursor: not-allowed; box-shadow: none; }
.btn-out { display: inline-flex; align-items: center; gap: 8px; padding: 14px 37px; background: transparent; color: var(--gold); border: 1px solid var(--gold); font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; font-weight: 500; cursor: pointer; transition: all .25s; text-decoration: none; border-radius: 60px; }
.btn-out:hover { background: var(--gold); color: #fff; box-shadow: 0 6px 24px rgba(184,151,106,.25); }
.btn-ghost { display: inline-flex; align-items: center; gap: 8px; padding: 13px 30px; background: transparent; color: var(--soft); border: 1px solid var(--border); font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; cursor: pointer; transition: all .25s; text-decoration: none; border-radius: 60px; }
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

/* ── LAYOUT ── */
.container { max-width: 1180px; margin: 0 auto; padding: 0 32px; }
.section { padding: 90px 0; }
.tag { font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 14px; display: block; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem,3.5vw,3rem); font-weight: 400; line-height: 1.2; color: var(--text); }
.divider { width: 48px; height: 1px; background: var(--gold-lt); margin: 20px 0; }
.centered { text-align: center; }
.centered .divider { margin: 20px auto; }

/* ── FORMS ── */
.form-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--soft); display: block; margin-bottom: 8px; font-weight: 400; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 12px 16px; border: 1px solid var(--border); background: var(--white); font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 300; color: var(--text); outline: none; transition: border-color .2s; appearance: none; border-radius: 8px; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold-lt); }
.form-textarea { resize: vertical; min-height: 90px; line-height: 1.7; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.hint { font-size: 11px; color: var(--pale); margin-top: 7px; line-height: 1.6; }

/* ── CART DRAWER ── */
.cart-bg { position: fixed; inset: 0; background: rgba(61,46,36,.4); z-index: 400; display: none; }
.cart-bg.open { display: block; }
.cart-drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 420px; background: var(--white); z-index: 401; transform: translateX(100%); transition: transform .35s ease; display: flex; flex-direction: column; border-radius: 20px 0 0 20px; }
.cart-drawer.open { transform: translateX(0); }
.cart-head { padding: 24px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.cart-head h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; }
.cart-scroll { flex: 1; overflow-y: auto; padding: 20px 28px; }
.cart-item { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--border); }
.cart-item-img { width: 60px; height: 80px; background: var(--cream); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; border-radius: 8px; }
.cart-item-info { flex: 1; }
.cart-item-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 400; margin-bottom: 4px; }
.cart-item-meta { font-size: 11px; color: var(--soft); margin-bottom: 8px; }
.cart-item-price { font-size: 13px; color: var(--gold); }
.cart-remove { background: none; border: none; font-size: 18px; color: var(--pale); cursor: pointer; padding: 4px; }
.cart-foot { padding: 20px 28px; border-top: 1px solid var(--border); }
.cart-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
.cart-row.vat { font-size: 11px; color: var(--soft); }
.cart-row.total { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 20px; padding-top: 12px; border-top: 1px solid var(--border); }
.cart-empty { text-align: center; padding: 60px 20px; color: var(--pale); }
.modal-close { background: none; border: none; font-size: 20px; color: var(--pale); cursor: pointer; line-height: 1; padding: 4px; }

/* ── FOOTER ── */
footer { background: var(--text); color: rgba(255,255,255,.6); padding: 60px 0 32px; }
.footer-inner { max-width: 1180px; margin: 0 auto; padding: 0 32px; }
.footer-top { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 48px; margin-bottom: 48px; }
.footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400; color: #fff; margin-bottom: 12px; }
.footer-logo span { color: var(--gold); }
.footer-tagline { font-size: 12px; line-height: 1.8; color: rgba(255,255,255,.5); }
.footer-col h5 { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.4); margin-bottom: 16px; font-weight: 500; }
.footer-col a { display: block; font-size: 12px; color: rgba(255,255,255,.5); text-decoration: none; margin-bottom: 8px; transition: color .2s; cursor: pointer; }
.footer-col a:hover { color: var(--gold-lt); }
.footer-bottom { border-top: 1px solid rgba(255,255,255,.1); padding-top: 24px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }

/* ── PATH CARDS ── */
.path-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 52px; }
.path-card { background: var(--white); border: 1px solid var(--border); padding: 52px 44px; text-decoration: none; display: block; position: relative; overflow: hidden; transition: all .35s; border-radius: 24px; cursor: pointer; }
.path-card:hover { box-shadow: 0 20px 56px rgba(61,46,36,.09); transform: translateY(-3px); }
.path-icon { font-size: 28px; margin-bottom: 24px; display: block; }
.path-tag { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 14px; display: block; }
.path-title { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; font-weight: 400; color: var(--text); margin-bottom: 16px; line-height: 1.2; }
.path-desc { font-size: 13px; color: var(--soft); line-height: 1.95; margin-bottom: 28px; }
.path-details { margin-bottom: 32px; }
.path-detail { font-size: 12px; color: var(--soft); display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
.path-detail::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--gold-lt); flex-shrink: 0; }
.path-cta { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--gold); font-weight: 500; display: inline-flex; align-items: center; gap: 10px; transition: gap .2s; }
.path-card:hover .path-cta { gap: 16px; }
.path-cta::after { content: '→'; }
.path-card-accent { position: absolute; bottom: -40px; right: -40px; width: 160px; height: 160px; border-radius: 50%; border: 1px solid var(--border); opacity: .5; pointer-events: none; }
.path-card-accent2 { position: absolute; bottom: -70px; right: -70px; width: 220px; height: 220px; border-radius: 50%; border: 1px solid var(--border); opacity: .25; pointer-events: none; }

/* ── UPLOAD PAGE ── */
.upload-wrap { max-width: 760px; margin: 0 auto; padding: 64px 32px 100px; }
.step-bar { display: flex; align-items: center; gap: 0; margin-bottom: 56px; }
.step-item { display: flex; align-items: center; gap: 12px; flex: 1; }
.step-item:last-child { flex: 0; }
.step-num { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--pale); font-weight: 500; flex-shrink: 0; transition: all .3s; background: var(--white); }
.step-num.active { border-color: var(--gold); color: var(--gold); }
.step-num.done { background: var(--gold); border-color: var(--gold); color: #fff; }
.step-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--pale); transition: color .3s; }
.step-label.active { color: var(--text); }
.step-line { flex: 1; height: 1px; background: var(--border); margin: 0 16px; }

/* ── DROP ZONE ── */
.drop-zone { border: 1.5px dashed var(--border); border-radius: 24px; padding: 72px 40px; text-align: center; cursor: pointer; transition: all .3s; background: var(--white); position: relative; }
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--gold); background: rgba(184,151,106,.04); }
#fileInput { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

/* ── CHECK RESULTS ── */
.check-card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 32px; margin-bottom: 16px; }
.check-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 20px; color: var(--text); }
.check-row { display: flex; align-items: flex-start; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.check-row:last-child { border-bottom: none; padding-bottom: 0; }
.check-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 1px; }
.check-icon.ok { background: #EAF4EE; color: #5A9E6F; }
.check-icon.warn { background: #FDF4E7; color: #C97B3A; }
.check-icon.err { background: #FCEAEA; color: #C94A3A; }
.check-icon.info { background: #EAF0F7; color: #4A7FAA; }
.check-label { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--soft); margin-bottom: 4px; }
.check-val { font-size: 14px; color: var(--text); font-weight: 400; }
.check-note { font-size: 12px; color: var(--soft); margin-top: 3px; line-height: 1.6; }

/* ── PAPER SELECTOR ── */
.paper-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 16px; }
.paper-opt { border: 1.5px solid var(--border); border-radius: 16px; padding: 20px 18px; cursor: pointer; transition: all .25s; text-align: center; background: var(--white); }
.paper-opt:hover { border-color: var(--gold-lt); }
.paper-opt.selected { border-color: var(--gold); background: rgba(184,151,106,.04); }
.paper-opt .paper-name { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 400; margin-bottom: 4px; color: var(--text); }
.paper-opt .paper-sub { font-size: 11px; color: var(--soft); line-height: 1.6; margin-bottom: 8px; }
.paper-opt .paper-price { font-size: 12px; color: var(--gold); }

/* ── QTY ── */
.qty-row { display: flex; align-items: center; gap: 16px; margin-top: 16px; }
.qty-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--soft); transition: all .2s; }
.qty-btn:hover { border-color: var(--gold); color: var(--gold); }
.qty-val { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; min-width: 48px; text-align: center; }
.qty-label { font-size: 12px; color: var(--soft); }

/* ── PRICE SUMMARY ── */
.price-strip { background: var(--cream); border-radius: 16px; padding: 24px 28px; margin-top: 24px; }
.price-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: var(--soft); }
.price-row.total { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--text); font-weight: 400; margin-bottom: 0; padding-top: 12px; border-top: 1px solid var(--border); margin-top: 8px; }

/* ── CHECKOUT MODAL ── */
.co-modal-bg { position:fixed;inset:0;background:rgba(61,46,36,.55);z-index:600;display:none;align-items:center;justify-content:center;padding:24px; }
.co-modal-bg.open { display:flex; }
.co-modal { background:var(--white);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;border-radius:20px;animation:fadeUp .3s ease both; }
.co-head { padding:28px 32px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
.co-head h3 { font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400; }
.co-body { padding:28px 32px; }
.co-section-title { font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:14px;margin-top:24px;display:block; }
.co-section-title:first-child { margin-top:0; }
.co-summary-item { display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid var(--border);color:var(--soft); }
.co-summary-item:last-child { border-bottom:none; }
.co-summary-item.total { font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--text);font-weight:400;padding-top:12px;margin-top:4px;border-top:2px solid var(--border);border-bottom:none; }
.co-field { margin-bottom:16px; }
.co-label { font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);display:block;margin-bottom:6px;font-weight:400; }
.co-input { width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-family:'Jost',sans-serif;font-size:13px;color:var(--text);background:var(--white);outline:none;transition:border-color .2s; }
.co-input:focus { border-color:var(--gold-lt); }
.co-input.error { border-color:var(--err); }
.co-row { display:grid;grid-template-columns:1fr 1fr;gap:14px; }
.co-stripe-note { display:flex;align-items:center;gap:10px;background:var(--cream);border-radius:12px;padding:14px 16px;margin-top:8px;margin-bottom:20px; }
.co-stripe-note svg { flex-shrink:0; }
.co-stripe-note p { font-size:11px;color:var(--soft);line-height:1.6; }
.co-err { background:#FCEAEA;color:var(--err);border-radius:10px;padding:12px 16px;font-size:12px;margin-bottom:16px;display:none; }

/* ── QTY CHIPS ── */
.qty-chip { display:inline-flex;align-items:center;justify-content:center;min-width:56px;padding:10px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Cormorant Garamond',serif;font-weight:400;color:var(--text);cursor:pointer;transition:all .2s;background:var(--white); }
.qty-chip:hover { border-color:var(--gold-lt); }
.qty-chip.selected { border-color:var(--gold);background:rgba(184,151,106,.06);color:var(--gold); }

/* ── STUDIO V2 ── */
.st-wrap { display: grid; grid-template-columns: 3fr 2fr; gap: 0; height: calc(100vh - 64px); overflow: hidden; }
.st-left { overflow-y: auto; min-height: 0; padding: 26px 22px 40px; background: var(--white); border-right: 1px solid var(--border); }
.st-left::-webkit-scrollbar { width: 3px; }
.st-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.st-right { background: var(--cream); display: flex; flex-direction: column; overflow-y: auto; min-height: 0; padding: 20px 18px 28px; }
.st-right::-webkit-scrollbar { width: 3px; }
.st-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.st-sec { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.st-sec:last-child { border-bottom: none; margin-bottom: 0; }
.st-stitle { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--soft); margin-bottom: 10px; font-weight: 500; }
.stc-grid { display: grid; grid-template-columns: repeat(3, 115px); gap: 7px; }
.stc { border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: all .2s; background: var(--white); }
.stc:hover { border-color: var(--gold-lt); }
.stc.on { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
.stc-tw { position: relative; }
.stc-tw svg { width: 100%; height: auto; display: block; }
.stc-arr { position: absolute; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,.9); border: 1px solid var(--border); font-size: 13px; color: var(--soft); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; transition: all .2s; line-height: 1; padding: 0; }
.stc-arr:hover { background: var(--white); border-color: var(--gold); color: var(--gold); }
.stc-arr-l { left: 3px; } .stc-arr-r { right: 3px; }
.stc-dots { display: flex; justify-content: center; gap: 3px; padding: 4px 0 2px; }
.stc-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border); }
.stc-dot.on { background: var(--gold); }
.stc-name { font-size: 9px; letter-spacing: .06em; text-transform: uppercase; color: var(--soft); text-align: center; padding: 0 3px 2px; font-weight: 500; }
.stc.on .stc-name { color: var(--gold); }
.stc-tname { font-size: 8px; color: var(--pale); text-align: center; padding: 0 3px 5px; line-height: 1.3; }
.st-pal { display: flex; flex-wrap: wrap; gap: 10px; }
.st-pw { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
.st-pc { width: 36px; height: 36px; border-radius: 50%; border: 2.5px solid transparent; transition: all .2s; }
.st-pw.on .st-pc { border-color: var(--text); transform: scale(1.15); }
.st-pn { font-size: 10px; color: var(--soft); text-align: center; max-width: 48px; line-height: 1.3; }
.st-fi { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 9px; background: var(--cream); font-family: 'Jost',sans-serif; font-size: 12px; font-weight: 300; color: var(--text); outline: none; transition: border-color .2s; margin-bottom: 8px; }
.st-fi:focus { border-color: var(--gold-lt); background: var(--white); }
.st-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.st-ai-btn { width: 100%; padding: 9px 14px; background: transparent; border: 1px solid var(--border); border-radius: 60px; font-family: 'Jost',sans-serif; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--soft); cursor: pointer; transition: all .2s; text-align: left; display: flex; align-items: center; justify-content: space-between; }
.st-ai-btn:hover, .st-ai-btn.open { border-color: var(--gold); color: var(--gold); }
.st-ai-panel { display: none; margin-top: 10px; }
.st-ai-panel.open { display: block; }
.st-popt { display: flex; align-items: center; gap: 9px; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 9px; cursor: pointer; margin-bottom: 6px; transition: all .2s; }
.st-popt.on { border-color: var(--gold); }
.st-popt .radio { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.st-popt.on .radio { border-color: var(--gold); }
.st-popt .rdot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); display: none; }
.st-popt.on .rdot { display: block; }
.st-env-hd { display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin-bottom: 6px; }
.st-tpill { width: 36px; height: 20px; border-radius: 10px; background: var(--border); position: relative; transition: background .2s; flex-shrink: 0; }
.st-tpill.on { background: var(--gold); }
.st-tknob { width: 16px; height: 16px; border-radius: 50%; background: var(--white); position: absolute; top: 2px; left: 2px; transition: left .2s; }
.st-tpill.on .st-tknob { left: 18px; }
.st-env-col { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: all .2s; }
.st-env-col.on { border-color: var(--text); transform: scale(1.15); }
.st-qty-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
.st-qtab { padding: 6px 12px; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--pale); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; background: none; border-top: none; border-left: none; border-right: none; font-family: 'Jost',sans-serif; }
.st-qtab.on { color: var(--gold); border-bottom-color: var(--gold); }
.st-qty-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; }
.st-qp { padding: 8px 4px; border: 1.5px solid var(--border); border-radius: 7px; font-family: 'Jost',sans-serif; font-size: 12px; color: var(--soft); cursor: pointer; background: var(--white); transition: all .2s; text-align: center; }
.st-qp:hover { border-color: var(--gold-lt); }
.st-qp.on { background: var(--gold); color: #fff; border-color: var(--gold); font-weight: 500; }
.st-preview { aspect-ratio: 148 / 210; max-height: calc(100vh - 380px); width: auto; margin: 0 auto; background: var(--white); border-radius: 6px; overflow: hidden; box-shadow: 0 4px 24px rgba(61,46,36,.15); }
.st-preview svg { width: 100%; height: 100%; display: block; }
.st-pricebox { background: var(--white); border: 1px solid var(--border); border-radius: 11px; padding: 10px 12px; margin-top: auto; }
.st-pr { display: flex; justify-content: space-between; font-size: 10px; color: var(--soft); margin-bottom: 3px; }
.st-pr-s { display: flex; justify-content: space-between; font-size: 11px; color: var(--text); margin-bottom: 3px; padding-top: 6px; border-top: 1px solid var(--border); margin-top: 3px; }
.st-pr-t { display: flex; justify-content: space-between; font-family: 'Cormorant Garamond',serif; font-size: 0.95rem; padding-top: 6px; border-top: 1px solid var(--border); margin-top: 3px; }
.st-cdot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); display: inline-block; }
.st-cdot.used { background: var(--border); }
.st-vg { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-top: 8px; }
.st-vc { border: 1.5px solid var(--border); border-radius: 7px; padding: 4px; cursor: pointer; background: var(--white); transition: border-color .2s; }
.st-vc:hover { border-color: var(--gold); }
.st-vc svg { width: 100%; height: auto; display: block; border-radius: 4px; }
.st-fopt { display:inline-flex;align-items:center;padding:5px 10px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:11px;color:var(--soft);transition:all .2s;background:var(--white);font-family:inherit; }
.st-fopt.on { border-color:var(--gold);color:var(--gold);background:rgba(184,151,106,.05); }
.st-fopt:hover { border-color:var(--gold-lt); }
.st-topt { padding:5px 12px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:11px;color:var(--soft);transition:all .2s;background:var(--white);font-family:'Jost',sans-serif;line-height:1; }
.st-topt.on { background:var(--gold);color:#fff;border-color:var(--gold); }
.st-topt:hover:not(.on) { border-color:var(--gold-lt); }
.st-vcl { font-size: 8px; letter-spacing: .06em; text-transform: uppercase; color: var(--gold); text-align: center; margin-top: 3px; }
.field-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Jost',sans-serif; font-size: 13px; color: var(--text); background: var(--white); outline: none; transition: border-color .2s; margin-bottom: 12px; }
.field-input:focus { border-color: var(--gold-lt); }

/* ── SUCCESS SCREEN ── */
.success-wrap { max-width: 560px; margin: 0 auto; padding: 100px 32px; text-align: center; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: #fff; padding: 14px 28px; border-radius: 60px; font-size: 12px; letter-spacing: .06em; opacity: 0; transition: all .35s; z-index: 999; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 768px) {
  .path-grid { grid-template-columns: 1fr; }
  .footer-top { grid-template-columns: 1fr 1fr; gap: 32px; }
  .hinner nav { display: none; }
  .grid-2 { grid-template-columns: 1fr; }
  .st-wrap { grid-template-columns: 1fr; height: auto; overflow: visible; }
  .st-right { display: none; }
  .paper-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px) {
  .footer-top { grid-template-columns: 1fr; }
  .paper-grid { grid-template-columns: 1fr; }
}

    <div style="background:var(--white);border:1px solid var(--border);border-radius:20px;padding:36px;margin-bottom:20px;">
      <h2 class="serif" style="font-size:1.3rem;font-weight:400;margin-bottom:14px;">Personalised Goods</h2>
      <p style="font-size:13px;color:var(--soft);line-height:2;">Under Regulation 28(1)(b) of the Consumer Contracts (Information, Cancellation and Additional Charges) Regulations 2013, the right to cancel does not apply to goods that are made to the consumer's specification or are clearly personalised. As all of our products are personalised to your individual requirements, we are unable to accept returns or offer refunds except in the circumstances set out below.</p>

    <div style="background:var(--white);border:1px solid var(--border);border-radius:20px;padding:36px;margin-bottom:20px;">
      <h2 class="serif" style="font-size:1.3rem;font-weight:400;margin-bottom:14px;">Defective or Damaged Goods</h2>
      <p style="font-size:13px;color:var(--soft);line-height:2;margin-bottom:12px;">If your order arrives damaged in transit, or if there is a manufacturing defect (meaning a printing or production error that differs from your approved proof), please contact us at hello@invitations.co.uk within 14 days of receipt.</p>
      <p style="font-size:13px;color:var(--soft);line-height:2;">Please include your order reference number, a description of the issue, and photographs clearly showing the defect. We will assess your claim and, where a manufacturing defect is confirmed, offer a reprint or a full refund at our discretion.</p>
    </div>

    <div style="background:var(--white);border:1px solid var(--border);border-radius:20px;padding:36px;margin-bottom:20px;">
      <h2 class="serif" style="font-size:1.3rem;font-weight:400;margin-bottom:14px;">What Is Not Covered</h2>
      <p style="font-size:13px;color:var(--soft);line-height:2;">We are unable to offer a refund or reprint for errors in content that were present in your approved proof, including spelling mistakes, incorrect dates or names, or any other details that you confirmed as correct at the approval stage. It is your responsibility to check all proof content carefully before approval.</p>
    </div>

    <div style="background:var(--white);border:1px solid var(--border);border-radius:20px;padding:36px;margin-bottom:20px;">
      <h2 class="serif" style="font-size:1.3rem;font-weight:400;margin-bottom:14px;">Cancellations Before Proof Approval</h2>
      <p style="font-size:13px;color:var(--soft);line-height:2;">If you wish to cancel your order before you have approved your digital proof, please contact us as soon as possible at hello@invitations.co.uk. We will consider cancellation requests on a case-by-case basis. If design work has already begun, we may deduct a design fee from any refund.</p>

    <div style="background:var(--white);border:1px solid var(--border);border-radius:20px;padding:36px;margin-bottom:40px;">

      <p style="font-size:13px;color:var(--soft);line-height:2;">For all returns and refund enquiries, please contact us at <strong>hello@invitations.co.uk</strong> quoting your order reference number.</p>

      <a class="btn-out" href="/">Back to Home</a>

  </div>

<script>
let cart=[];
try{cart=JSON.parse(localStorage.getItem('inv_cart')||'[]');}catch(e){cart=[];}
function saveCart(){localStorage.setItem('inv_cart',JSON.stringify(cart));}
function updateCartBadge(){document.querySelectorAll('#cartCount').forEach(el=>el.textContent=cart.length);}
function removeCartItem(i){cart.splice(i,1);saveCart();updateCartBadge();renderCartDrawer();}
function openCart(){renderCartDrawer();document.getElementById('cartBg').classList.add('open');document.getElementById('cartDrawer').classList.add('open');}
function closeCart(){document.getElementById('cartBg').classList.remove('open');document.getElementById('cartDrawer').classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function renderCartDrawer(){
  const scroll=document.getElementById('cartScroll'),foot=document.getElementById('cartFoot');
  if(!cart.length){scroll.innerHTML='<div class="cart-empty"><div style="font-size:40px;margin-bottom:16px;">&#x2736;</div><p style="font-size:13px;color:var(--pale);">Your basket is empty</p></div>';foot.style.display='none';return;}
  scroll.innerHTML=cart.map((item,i)=>`<div class="cart-item"><div class="cart-item-img">${item.icon||'&#x2736;'}</div><div class="cart-item-info"><div class="cart-item-name serif">${item.name}</div><div class="cart-item-meta">${item.qty} invitations &middot; ${item.paper||'Smooth White'}</div><div class="cart-item-price">&#163;${item.total.toFixed(2)}</div></div><button class="cart-remove" onclick="removeCartItem(${i})">&#x2715;</button></div>`).join('');
  const sub=cart.reduce((s,i)=>s+i.total,0);
  document.getElementById('cartNet').textContent='&#163;'+(sub/1.2).toFixed(2);
  document.getElementById('cartVat').textContent='&#163;'+(sub-sub/1.2).toFixed(2);
  document.getElementById('cartTotal').textContent='&#163;'+sub.toFixed(2);
  foot.style.display='block';
}
updateCartBadge();
</script>
