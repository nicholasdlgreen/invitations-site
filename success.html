<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — Your Invitations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf8f4;
      --stone: #e8e2d9;
      --ink: #2a2522;
      --muted: #7a6f67;
      --gold: #b8965a;
    }

    body {
      min-height: 100vh;
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      color: var(--ink);
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 80%, rgba(184,150,90,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(184,150,90,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      background: #fff;
      border: 1px solid var(--stone);
      max-width: 520px;
      width: 100%;
      padding: 56px 48px;
      text-align: center;
      position: relative;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before, .card::after {
      content: '✦';
      position: absolute;
      color: var(--gold);
      font-size: 12px;
      opacity: 0.5;
    }
    .card::before { top: 16px; left: 20px; }
    .card::after  { bottom: 16px; right: 20px; }

    .check-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      animation: scaleIn 0.5s 0.3s ease both;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    .check-circle svg {
      width: 28px;
      height: 28px;
      stroke: var(--gold);
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(28px, 5vw, 38px);
      letter-spacing: 0.02em;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    h1 em {
      font-style: italic;
      color: var(--gold);
    }
